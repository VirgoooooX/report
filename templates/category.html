<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ category_name }} Category - M60 EVT REL</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#1a1f36;color:#e0e4f0;min-height:100vh}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
.nav {
  position: sticky; top: 0; z-index: 100;
  background: #0f1425;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 0 32px;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
.nav-inner {
  max-width: 1440px; margin: 0 auto;
  display: flex; align-items: center;
  height: 60px; gap: 24px;
}
.nav-brand {
  display: flex; align-items: center; gap: 12px;
  font-weight: 700; font-size: 1.05rem;
  color: #e8eaf0; white-space: nowrap;
}
.nav-brand .badge {
  background: #6366f1; color: #fff;
  font-size: 0.6rem; padding: 2px 8px; border-radius: 10px;
  font-weight: 600; letter-spacing: 0.3px;
}
.nav-links {
  display: flex; gap: 4px; margin-left: auto; align-items: center;
}
.nav-links a {
  color: #6b7194; text-decoration: none;
  padding: 6px 14px; border-radius: 6px; font-size: 0.85rem;
  font-weight: 500; transition: 0.25s ease;
}
.nav-links a:hover { color: #e8eaf0; background: rgba(255,255,255,0.06); }
.nav-links a.active { color: #fff; background: rgba(99,102,241,0.2); }
.container{max-width:1400px;margin:0 auto;padding:24px}
h1{font-size:24px;font-weight:700;margin-bottom:4px}
h2{font-size:18px;font-weight:600;margin:24px 0 12px}
.subtitle{color:#8b92b0;font-size:14px;margin-bottom:24px}
.card{background:#252b43;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.breadcrumb{color:#8b92b0;font-size:13px;margin-bottom:16px}
.breadcrumb a{color:#3498db;text-decoration:none}
.back-btn{display:inline-block;padding:8px 16px;background:#3498db;color:#fff;border-radius:6px;text-decoration:none;font-size:14px;margin-bottom:16px;transition:background .2s}
.back-btn:hover{background:#2980b9}
.summary-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.summary-card{background:#252b43;border-radius:10px;padding:16px;text-align:center}
.summary-card .label{font-size:12px;color:#8b92b0;margin-bottom:4px}
.summary-card .value{font-size:28px;font-weight:700}
.summary-card .pct{font-size:13px;color:#8b92b0;margin-top:4px}
.color-drop{color:#e74c3c}.color-ingress{color:#3498db}.color-env{color:#2ecc71}.color-mech{color:#f39c12}
.progress-bar{height:8px;background:#1a1f36;border-radius:4px;margin:8px 0;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .6s ease}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#1a1f36;padding:10px 12px;text-align:left;font-weight:600;color:#8b92b0;border-bottom:2px solid #2a2f45;position:sticky;top:60px}
td{padding:10px 12px;border-bottom:1px solid #2a2f45}
tr:hover td{background:rgba(52,152,219,.05)}
.wf-row{cursor:pointer}
.wf-row:hover{background:rgba(52,152,219,.08) !important}
.wf-detail{display:none;background:#1a1f36}
.wf-detail.open{display:table-row}
.wf-detail td{padding:16px 24px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge-pass{background:#2ecc71;color:#fff}
.badge-spec{background:#e74c3c;color:#fff}
.badge-strife{background:#f39c12;color:#fff}
.badge-pending{background:#3498db;color:#fff}
.loading{text-align:center;padding:40px;color:#8b92b0}
.error{text-align:center;padding:40px;color:#e74c3c}
.error button{display:inline-block;margin-top:12px;padding:8px 20px;background:#e74c3c;color:#fff;border:none;border-radius:6px;cursor:pointer}
.tabs{display:flex;gap:2px;margin-bottom:16px;border-bottom:2px solid #2a2f45}
.tab{padding:8px 20px;cursor:pointer;color:#8b92b0;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;font-size:14px}
.tab:hover{color:#e0e4f0}
.tab.active{color:#3498db;border-bottom-color:#3498db}
@media(max-width:768px){.summary-cards{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <div class="nav-brand">
      <span class="badge">EVT REL</span>
      M60 — Test Progress Dashboard
    </div>
    <div class="nav-links">
      <a href="/">Dashboard</a>
      <a href="/category/Drop" class="active">Categories</a>
      <a href="/sn">SN Lookup</a>
      <a href="/predictions">Predictions</a>
      <a href="/export">Export</a>
    </div>
  </div>
</nav>
<div class="container">
  <div class="breadcrumb"><a href="/">Dashboard</a> / <strong>{{ category_name }}</strong></div>
  <h1>{{ category_name }} Category</h1>
  <p class="subtitle">Per-WF completion detail for {{ category_name }} tests</p>
  
  <a href="/" class="back-btn">&larr; Back to Dashboard</a>

  <div class="summary-cards" id="summaryCards"></div>

  <div class="card">
    <h2>WF Completion Detail</h2>
    <div id="contentArea"><div class="loading">Loading...</div></div>
  </div>
</div>

<script>
const CATEGORY = '{{ category_name }}';
const CATEGORY_COLORS = {Drop:'#e74c3c',Ingress:'#3498db',Environmental:'#2ecc71',Mechanical:'#f39c12'};
const CATEGORY_CLASS = {Drop:'color-drop',Ingress:'color-ingress',Environmental:'color-env',Mechanical:'color-mech'};
const COLOR = CATEGORY_COLORS[CATEGORY] || '#3498db';
const COLOR_CLASS = CATEGORY_CLASS[CATEGORY] || '';

function fmt(n){return Number(n).toFixed(1)}

async function load(){
  const area = document.getElementById('contentArea');
  area.innerHTML = '<div class="loading">Loading...</div>';

  try {
    const r = await fetch(`/api/completion/category/${CATEGORY}`);
    if(!r.ok) throw new Error(await r.text());
    const data = await r.json();
    render(data);
  } catch(e){
    area.innerHTML = `<div class="error">Failed to load: ${e.message}<br><button onclick="load()">Retry</button></div>`;
  }
}

function render(data){
  const wfs = data.wfs || [];
  const wfNames = data.wf_names || {};
  if(!wfs.length){
    document.getElementById('contentArea').innerHTML = '<div class="loading">No data for this category</div>';
    return;
  }

  // Summary — hierarchical: Overall → Per Config
  let totalCps = 0, completedCps = 0;
  const byCfg = {};
  wfs.forEach(w => {
    totalCps += w.total_cps || 0;
    completedCps += w.completed_cps || 0;
    if(!byCfg[w.config]) byCfg[w.config] = {total:0,completed:0};
    byCfg[w.config].total += w.total_cps || 0;
    byCfg[w.config].completed += w.completed_cps || 0;
  });
  
  const overallPct = totalCps ? fmt(completedCps/totalCps*100) : 0;
  let cardsHtml = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:8px">`;
  // Overall
  cardsHtml += `<div style="background:#252b43;border-radius:10px;padding:16px 20px;border:1px solid rgba(255,255,255,0.06);position:relative;overflow:hidden">
    <div style="position:absolute;left:0;top:0;bottom:0;background:${COLOR}1a;width:${overallPct}%;border-radius:10px 0 0 10px;transition:width 0.8s ease"></div>
    <div style="position:relative;z-index:1">
      <div style="font-size:11px;color:#8b92b0;margin-bottom:6px">Overall Completion</div>
      <div style="font-size:28px;font-weight:700;color:${COLOR}">${overallPct}%</div>
      <div style="font-size:12px;color:#6b7194;margin-top:2px">${completedCps} / ${totalCps} CPs</div>
    </div>
  </div>`;
  const cfgOrder = ['R1FNF','R2CNM','R3','R4'];
  for(const cfg of cfgOrder){
    const d = byCfg[cfg];
    if(!d) continue;
    const pct = d.total ? fmt(d.completed/d.total*100) : 0;
    cardsHtml += `<div style="background:#252b43;border-radius:10px;padding:16px 20px;border:1px solid rgba(255,255,255,0.06);position:relative;overflow:hidden">
      <div style="position:absolute;left:0;top:0;bottom:0;background:${COLOR}1a;width:${pct}%;border-radius:10px 0 0 10px;transition:width 0.8s ease"></div>
      <div style="position:relative;z-index:1">
        <div style="font-size:11px;color:#8b92b0;margin-bottom:6px">${cfg}</div>
        <div style="font-size:22px;font-weight:700;color:#e0e4f0">${pct}%</div>
        <div style="font-size:12px;color:#6b7194;margin-top:2px">${d.completed} / ${d.total} CPs</div>
      </div>
    </div>`;
  }
  cardsHtml += '</div>';
  document.getElementById('summaryCards').innerHTML = cardsHtml;

  // Group by WF — include wf_name
  const byWf = {};
  wfs.forEach(w => {
    if(!byWf[w.wf]) byWf[w.wf] = {configs:[],totalCps:0,completedCps:0,totalSns:0,wfName:''};
    byWf[w.wf].configs.push(w);
    byWf[w.wf].totalCps += w.total_cps || 0;
    byWf[w.wf].completedCps += w.completed_cps || 0;
    byWf[w.wf].totalSns += w.sn_count || 0;
    byWf[w.wf].wfName = w.wf_name || wfNames[w.wf] || '';
  });

  const wfKeys = Object.keys(byWf).sort((a,b)=>parseFloat(a)-parseFloat(b));

  let html = '<div style="display:flex;flex-direction:column;gap:0">';
  wfKeys.forEach(wf => {
    const wd = byWf[wf];
    const wfPct = wd.totalCps ? fmt(wd.completedCps/wd.totalCps*100) : 0;
    html += `<div class="wf-group-header" style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #2a2f45;cursor:pointer;transition:background .2s" onclick="toggleWF('${wf}')">
      <span style="display:inline-block;transition:transform .2s;font-size:12px;width:16px" id="arr-${wf}">&#9654;</span>
      <span style="background:${COLOR};color:#fff;font-size:12px;font-weight:600;padding:3px 10px;border-radius:5px">WF${wf}</span>
      <span style="flex:1;font-weight:500;font-size:14px">${wd.wfName}</span>
      <span style="color:${COLOR};font-weight:700;font-size:18px;min-width:50px;text-align:right">${wfPct}%</span>
    </div>`;
    html += `<div class="wf-config-rows" id="cfg-${wf}" style="display:none;background:#1a1f36;padding:0 0 0 28px">`;
    wd.configs.forEach(c => {
      const pct = c.total_cps ? fmt(c.completed_cps/c.total_cps*100) : 0;
      html += `<div style="display:flex;align-items:center;gap:12px;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:13px">
        <span style="color:#8b92b0;min-width:60px">${c.config}</span>
        <div style="flex:1;height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden">
          <div style="height:100%;border-radius:3px;background:${COLOR};width:${pct}%"></div>
        </div>
        <span style="color:#e0e4f0;font-weight:600;min-width:50px;text-align:right">${pct}%</span>
        <span style="color:#6b7194;min-width:80px;text-align:right">${c.completed_cps}/${c.total_cps} CPs</span>
        <span style="color:#6b7194;min-width:40px;text-align:right">${c.sn_count||'-'} SN</span>
      </div>`;
    });
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('contentArea').innerHTML = html;

  html += '</tbody></table>';
  document.getElementById('contentArea').innerHTML = html;
}

window.toggleWF = function(wf){
  const cfg = document.getElementById('cfg-'+wf);
  const arr = document.getElementById('arr-'+wf);
  if(!cfg) return;
  const open = cfg.style.display !== 'none';
  cfg.style.display = open ? 'none' : 'block';
  arr.style.transform = open ? 'rotate(0deg)' : 'rotate(90deg)';
};

load();
</script>
</body>
</html>
